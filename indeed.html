<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      function tintModel(entityId, colorHex, roughness, metalness) {
        var el = document.querySelector(entityId);
        if (!el) return;
        el.addEventListener('model-loaded', function () {
          var root = el.getObject3D('mesh');
          if (!root) return;
          root.traverse(function (obj) {
            if (!obj.isMesh || !obj.material) return;
            var mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(function (m) {
              if (m.color) m.color.set(colorHex);
              if ('roughness' in m) m.roughness = roughness;
              if ('metalness' in m) m.metalness = metalness;
              m.needsUpdate = true;
            });
          });
        });
      }
      document.addEventListener('DOMContentLoaded', function () {
        tintModel('#rocky', '#9b7230', 0.82, 0.14);
        tintModel('#grace', '#696969', 0.97, 0.02);
      });
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
    </style>
  </head>
  <body>
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="antialias: true; alpha: true"
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; facingMode: environment;"
    >
      <a-assets>
        <a-asset-item id="rockyModel" src="./rocky.glb"></a-asset-item>
        <a-asset-item id="graceModel" src="./grace.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">

        <!-- Rocky: マーカーの上 -->
        <a-entity id="rocky"
                  gltf-model="#rockyModel"
                  position="0 0 0"
                  scale="0.02 0.02 0.02"
                  rotation="-90 90 0">
        </a-entity>

        <!-- Grace -->
        <a-entity id="grace"
                  gltf-model="#graceModel"
                  position="0 0.15 0"
                  scale="0.013 0.013 0.013"
                  rotation="-90 90 0">
        </a-entity>

      </a-marker>

      <a-entity light="type: ambient; color: #ffffff; intensity: 1.2"></a-entity>
      <a-entity light="type: directional; color: #fff3dd; intensity: 1.0" position="1 2 1"></a-entity>
      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
